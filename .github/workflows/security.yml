name: Security

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  public-safety-scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve scan range
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          base="${BASE_SHA:-HEAD~1}"
          head="${HEAD_SHA:-HEAD}"
          git cat-file -e "${base}^{commit}" 2>/dev/null || git fetch --no-tags --depth=50 origin "${base}" || true
          git cat-file -e "${head}^{commit}" 2>/dev/null || git fetch --no-tags --depth=50 origin "${head}" || true
          if ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            base="HEAD~1"
          fi
          echo "SCAN_BASE=$base" >> "$GITHUB_ENV"
          echo "SCAN_HEAD=$head" >> "$GITHUB_ENV"

      - name: Scan changed files for private markers
        run: |
          set -euo pipefail
          files="$(git diff --name-only "$SCAN_BASE..$SCAN_HEAD" -- . ':!*.png' ':!*.jpg' ':!*.jpeg' ':!*.gif' ':!*.ico' || true)"
          if [ -z "$files" ]; then
            echo "No text files changed."
            exit 0
          fi

          blocked='(BEGIN (RSA|OPENSSH|PRIVATE) KEY|AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9_]+|xox[baprs]-)'
          failed=0
          while IFS= read -r file; do
            [ -f "$file" ] || continue
            if grep -nEI "$blocked" "$file" >/tmp/public-safety-match.txt; then
              echo "::error file=$file::Potential secret pattern found."
              sed -E 's/:.*$/: [redacted]/' /tmp/public-safety-match.txt
              failed=1
            fi
            if grep -nE 'https://github\.com/[^ )]+' "$file" | grep -vE 'https://github\.com/NarratorAI-Studio/' >/tmp/public-safety-match.txt; then
              echo "::error file=$file::Disallowed external GitHub repository URL found."
              sed -E 's/:.*$/: [redacted]/' /tmp/public-safety-match.txt
              failed=1
            fi
          done <<< "$files"
          exit "$failed"

      - name: Check commit metadata for public-safe emails
        run: |
          set -euo pipefail
          failed=0
          while read -r email; do
            [ -n "$email" ] || continue
            local_part="${email%@*}"
            domain="${email#*@}"
            case "$local_part:$domain" in
              security:*|opensource:noreply.github.com|*:users.noreply.github.com) ;;
              *)
                echo "::error::Commit metadata contains a non-public-safe email."
                failed=1
                ;;
            esac
          done < <(git log --format='%ae%n%ce' "$SCAN_BASE..$SCAN_HEAD" | sort -u)
          exit "$failed"
