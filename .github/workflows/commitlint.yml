name: Commitlint

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  check-title:
    runs-on: ubuntu-24.04
    steps:
      - name: Check PR title format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          if printf '%s\n' "$PR_TITLE" | grep -Eq '^(feat|fix|chore|docs|style|refactor|perf|test|build|ci|revert)(\([^)]+\))?!?: .+'; then
            echo "PR title follows Conventional Commits."
          else
            echo "::error::PR title must match: <type>(<scope>): <description>"
            exit 1
          fi
